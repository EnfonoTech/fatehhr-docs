name: Build and push dist

on:
  push:
    branches: [main]

# Required for pushing to dist branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      # Copy built output to repo root for flat serving
      - run: |
          cp -r docs/.vitepress/dist/* .
          rm -rf docs node_modules pnpm-lock.yaml scripts

      - name: Push to dist branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan dist
          git add -A
          git commit -m "build: autogenerated from ${{ github.sha }}"
          git push origin dist --force
